name: Live Hub Deployment
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Project Dependencies
        run: npm install

      - name: Compile Full-Stack Distribution
        run: npm run build

      - name: Deploy Live to Firebase Routing
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.FIREBASE_TOKEN }}"
          firebaseServiceAccount: "PASTE_YOUR_ACTUAL_FIREBASE_TOKEN_HERE"
          projectId: "gen-lang-client-0844723798"
          channelId: live
