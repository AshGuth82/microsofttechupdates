name: Live Hub Deployment
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Project Dependencies
        run: npm install

      - name: Compile Full-Stack Distribution
        run: npm run build

      - name: Push Build Live to Firebase Hosting
        run: npx firebase-tools deploy --token "${{ secrets.FIREBASE_TOKEN }}" --only hosting --site gen-lang-client-0844723798 --project gen-lang-client-0844723798
