name: Live Hub Deployment
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Project Dependencies
        run: npm install

      - name: Compile Full-Stack Distribution
        run: npm run build

      - name: Authenticate and Deploy via Service Account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > gcp-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=gcp-key.json
          npx firebase-tools deploy --only hosting --project gen-lang-client-0844723798
        env:
          FIREBASE_TOKEN: "" # Clears out the old token so it forces the master key use
