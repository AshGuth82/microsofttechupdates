name: Live Hub Deployment
on:
  push:
    branches:
      - main  # Triggers the automated build whenever you save to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Project Dependencies
        run: npm ci

      - name: Compile Full-Stack Distribution
        run: npm run build

      - name: Deploy Live to Firebase Routing
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_TOKEN }}"
          projectId: "gen-lang-client-0844723798"
          channelId: live
